apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: missions.ai.kubestellar.io
spec:
  group: ai.kubestellar.io
  scope: Namespaced
  names:
    plural: missions
    singular: mission
    kind: Mission
    shortNames: [sm]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                schedule: { type: string }
                triggerRef: { type: string }
                providerPolicy: { type: string }
                memoryStoreRef: { type: string }
                toolBindingRef: { type: string }
                task: { type: string }
                concurrencyPolicy: { type: string }
                retryPolicy:
                  type: object
                  properties:
                    maxRetries: { type: integer, minimum: 0 }
                    backoff: { type: string }
            status:
              type: object
              properties:
                phase: { type: string }
                lastExecutionRef: { type: string }
                nextScheduledAt: { type: string, format: date-time }
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: missionexecutions.ai.kubestellar.io
spec:
  group: ai.kubestellar.io
  scope: Namespaced
  names:
    plural: missionexecutions
    singular: missionexecution
    kind: MissionExecution
    shortNames: [smx]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                missionRef: { type: string }
                triggerType: { type: string }
                triggerPayload:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase: { type: string }
                startedAt: { type: string, format: date-time }
                finishedAt: { type: string, format: date-time }
                summary: { type: string }
                error: { type: string }
---
