apiVersion: v1
kind: ServiceAccount
metadata:
  name: visual-login-groundtruth-reader
  namespace: default
  labels:
    app.kubernetes.io/name: kubestellar-console
    app.kubernetes.io/component: visual-login-groundtruth
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: visual-login-groundtruth-reader
  labels:
    app.kubernetes.io/name: kubestellar-console
    app.kubernetes.io/component: visual-login-groundtruth
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: visual-login-groundtruth-reader
  labels:
    app.kubernetes.io/name: kubestellar-console
    app.kubernetes.io/component: visual-login-groundtruth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: visual-login-groundtruth-reader
subjects:
  - kind: ServiceAccount
    name: visual-login-groundtruth-reader
    namespace: default
