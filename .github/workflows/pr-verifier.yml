name: PR Verifier

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions: read-all

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      checks: write
      pull-requests: read
    uses: kubestellar/infra/.github/workflows/reusable-pr-verifier.yml@88f4d5fff50ceea648cdd3848ed1835ebded5fe3 # pinned commit SHA (was @main)
