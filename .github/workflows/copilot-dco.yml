name: Copilot DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Explicit least-privilege permissions — prevents GITHUB_TOKEN from
# inheriting broad repo-wide defaults (contents:write, issues:write, etc.)
# See: https://github.com/kubestellar/console/issues/20492
permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  copilot-dco:
    # Pinned to commit SHA to prevent supply-chain drift from mutable @main (fixes #20493, #20494)
    uses: kubestellar/infra/.github/workflows/reusable-copilot-dco.yml@18213effcf16b25f46e956d6f4969b491d03b805 # main pinned 2026-07-08
