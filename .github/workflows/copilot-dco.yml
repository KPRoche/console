name: Copilot DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Least-privilege: read-only at workflow level; statuses:write scoped to the
# job that needs it so future jobs cannot inherit elevated permissions.
# See: https://github.com/kubestellar/console/issues/20492
# Fixes: https://github.com/kubestellar/console/issues/20604
permissions:
  contents: read
  pull-requests: read

jobs:
  copilot-dco:
    permissions:
      contents: read
      pull-requests: read
      # statuses: write required by the reusable DCO check to post commit status
      statuses: write
    # Pinned to commit SHA to prevent supply-chain drift from mutable @main (fixes #20493, #20494)
    uses: kubestellar/infra/.github/workflows/reusable-copilot-dco.yml@18213effcf16b25f46e956d6f4969b491d03b805 # main pinned 2026-07-08
